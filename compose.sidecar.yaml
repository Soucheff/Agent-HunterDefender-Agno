services:
  entra-agent-id-sidecar:
    image: mcr.microsoft.com/entra-sdk/auth-sidecar:1.1.1-azurelinux3.0-distroless
    platform: linux/amd64
    container_name: hunter-defender-entra-sidecar
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      # The sidecar's UseLocalCallerRestriction (enabled outside Development) only accepts
      # loopback source IPs. With the agent on the host and the sidecar in Docker, NAT rewrites
      # the source IP to the bridge gateway, so that middleware returns 403 for every non-health
      # endpoint. Development disables that redundant check; the port is already bound to
      # 127.0.0.1 only, so loopback-only access is still enforced at the Docker layer. In a
      # production pod, run the agent and sidecar in the same pod over localhost and set
      # ASPNETCORE_ENVIRONMENT=Production so the restriction applies correctly.
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      AllowedHosts: localhost
      AzureAd__Instance: https://login.microsoftonline.com/
      AzureAd__TenantId: ${AZURE_TENANT_ID:?AZURE_TENANT_ID is required}
      AzureAd__ClientId: ${ENTRA_AGENT_BLUEPRINT_CLIENT_ID:?ENTRA_AGENT_BLUEPRINT_CLIENT_ID is required}
      AzureAd__Audience: ${ENTRA_AGENT_BLUEPRINT_CLIENT_ID:?ENTRA_AGENT_BLUEPRINT_CLIENT_ID is required}
      AzureAd__Scopes: access_as_user
      AzureAd__ClientCredentials__0__SourceType: ClientSecret
      AzureAd__ClientCredentials__0__ClientSecret: ${ENTRA_AGENT_BLUEPRINT_CLIENT_SECRET:?ENTRA_AGENT_BLUEPRINT_CLIENT_SECRET is required}
      DownstreamApis__HunterDefenderMcp__BaseUrl: http://host.docker.internal:8000
      # Scopes binds to a string array, so it must be provided as an indexed element.
      DownstreamApis__HunterDefenderMcp__Scopes__0: ${ENTRA_MCP_SCOPE:?ENTRA_MCP_SCOPE is required}
      DownstreamApis__HunterDefenderMcp__RequestAppToken: "false"
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft.Identity.Web: Information
      Logging__LogLevel__Microsoft.AspNetCore: Warning
    extra_hosts:
      - "host.docker.internal:host-gateway"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
